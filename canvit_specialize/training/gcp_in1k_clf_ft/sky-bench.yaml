# Throughput-decomposition benchmark on TPU v6e-4 (SkyPilot managed job).
# Launch with `--env BENCH_MODE={dataloader,fwd,fwd_bwd}` to select mode.
# See canvit_specialize/training/gcp_in1k_clf_ft/bench.py for mode semantics.

name: canvit-in1k-bench

resources:
  ordered:
    - accelerators: tpu-v6e-4
      accelerator_args: {runtime_version: v2-alpha-tpuv6e}
      use_spot: true
      infra: gcp/asia-southeast1
    - accelerators: tpu-v6e-4
      accelerator_args: {runtime_version: v2-alpha-tpuv6e}
      use_spot: true
      infra: gcp/us-central1
    - accelerators: tpu-v6e-4
      accelerator_args: {runtime_version: v2-alpha-tpuv6e}
      use_spot: true
      infra: gcp/us-east5

workdir: .

secrets:
  HF_TOKEN:

envs:
  BENCH_MODE: "dataloader"   # dataloader | fwd | fwd_bwd
  BATCH_SIZE: "256"
  NUM_WORKERS: "32"
  N_GLIMPSES: "4"
  WARMUP_STEPS: "20"
  MEASURE_STEPS: "200"

setup: |
  cd ~/sky_workdir
  bash canvit_specialize/training/gcp_in1k_clf_ft/setup_tpu.sh

run: |
  export PATH="$HOME/.local/bin:$PATH"
  cd ~/sky_workdir

  ZONE=$(curl -sf -H "Metadata-Flavor: Google" http://metadata.google.internal/computeMetadata/v1/instance/zone | rev | cut -d/ -f1 | rev)
  REGION=${ZONE%-*}
  GCS_BUCKET="lamarck-${REGION}"
  gcloud storage ls "gs://${GCS_BUCKET}/datasets/imagenet/" > /dev/null
  mkdir -p ~/gcs
  gcsfuse --implicit-dirs "${GCS_BUCKET}" ~/gcs

  uv run --no-sync --group gcp-in1k-finetune python -u -m \
    canvit_specialize.training.gcp_in1k_clf_ft.bench \
    --mode "$BENCH_MODE" \
    --data-dir ~/gcs/datasets/imagenet \
    --batch-size "$BATCH_SIZE" \
    --num-workers "$NUM_WORKERS" \
    --n-glimpses "$N_GLIMPSES" \
    --warmup-steps "$WARMUP_STEPS" \
    --measure-steps "$MEASURE_STEPS"
