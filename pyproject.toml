[project]
name = "canvit-specialize"
version = "0.1.0"
description = "Downstream-task training (probes, LP-FT) for CanViT, with task-specific datasets and metrics"
requires-python = ">=3.12"
dependencies = [
    "canvit-pytorch",
    "dinov3",
    "torch>=2.0.0",
    "torchvision>=0.15.0",
    "pillow>=10.0.0",
    "huggingface-hub>=0.20.0",
    "safetensors>=0.4.0",
    "timm>=1.0.0",
    "tyro>=1.0.0",
    "tqdm>=4.60.0",
    "comet-ml>=3.30.0",
    "matplotlib>=3.8.0",
    "pandas>=2.0.0",
    "scikit-learn>=1.4.0",
    "transformers>=4.50.0",
    "pypatree>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["canvit_specialize"]

[dependency-groups]
dev = [
    "basedpyright>=1.37.2",
    "pypatree>=0.4.0",
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "ruff>=0.14.14",
]

# Extra dependencies for canvit_specialize/training/gcp_in1k_clf_ft/ (IN1K finetuning
# on GCP TPU v6e). Not required for ADE20K probe training or DINOv3 IN1K probe training.
# Install only on the TPU VM that runs the finetuning job:
#     uv sync --group gcp-in1k-finetune
gcp-in1k-finetune = [
    # torch==2.9.0 pin is load-bearing. torch_xla==2.9.0's wheel metadata
    # unusually declares NO torch dependency (only absl-py, numpy, pyyaml,
    # requests), so without an explicit pin here uv's resolver picks the
    # latest torch matching `torch>=2.0.0` from the pytorch-cu128 index
    # (currently torch==2.11.0+cu128). torch 2.10+ added a trailing `bool`
    # parameter to `torch::autograd::_wrap_outputs`, breaking torch_xla
    # 2.9.0's _XLAC.so ABI with `undefined symbol: _wrap_outputs` at
    # `import torch_xla`. Pinning just the version is sufficient — the
    # cu128 variant (torch==2.9.0+cu128) has the same autograd C++ API as
    # the CPU variant. Tested on TPU VM 2026-04-16.
    "torch==2.9.0",
    "torchvision==0.24.0",
    "torch_xla[tpu]==2.9.0; sys_platform == 'linux'",
    "tfrecord",
]

[tool.pytest.ini_options]
pythonpath = ["."]
filterwarnings = ["ignore:Failed to initialize NumPy:UserWarning"]

[tool.basedpyright]
typeCheckingMode = "standard"

[tool.ruff]
line-length = 120

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
canvit-pytorch = { git = "https://github.com/m2b3/CanViT-PyTorch.git" }
dinov3 = { git = "https://github.com/yberreby/dinov3.git" }
# Pin cu128 wheels on Linux (crockett: CUDA 12.9, Nibi H100). On macOS, fall back
# to default PyPI (CPU-only wheels) for local development.
torch = [{ index = "pytorch-cu128", marker = "sys_platform == 'linux'" }]
torchvision = [{ index = "pytorch-cu128", marker = "sys_platform == 'linux'" }]
