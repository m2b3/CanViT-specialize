[project]
name = "canvit-specialize"
version = "0.1.0"
description = "Downstream-task training (probes, LP-FT) for CanViT, with task-specific datasets and metrics"
requires-python = ">=3.12"
dependencies = [
    "canvit-pytorch",
    "dinov3",
    "torch>=2.0.0",
    "torchvision>=0.15.0",
    "pillow>=10.0.0",
    "huggingface-hub>=0.20.0",
    "safetensors>=0.4.0",
    "timm>=1.0.0",
    "tyro>=1.0.0",
    "tqdm>=4.60.0",
    "comet-ml>=3.30.0",
    "matplotlib>=3.8.0",
    "pandas>=2.0.0",
    "scikit-learn>=1.4.0",
    "transformers>=4.50.0",
    "pypatree>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["canvit_specialize"]

[dependency-groups]
dev = [
    "basedpyright>=1.37.2",
    "pypatree>=0.4.0",
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "ruff>=0.14.14",
]

# Extra dependencies for canvit_specialize/training/gcp_in1k_clf_ft/ (IN1K finetuning
# on GCP TPU v6e). Not required for ADE20K probe training or DINOv3 IN1K probe training.
# Install only on the TPU VM that runs the finetuning job:
#     uv sync --group gcp-in1k-finetune
gcp-in1k-finetune = [
    # torch_xla[tpu]==2.9.0's wheel declares NO torch dep, so an unpinned torch
    # resolves to whatever is latest on the active index — which breaks the
    # _XLAC.so ABI (torch 2.10 changed torch::autograd::_wrap_outputs). Pin
    # explicitly to 2.9.0 so uv picks the torch_xla-compatible build from PyPI.
    "torch==2.9.0",
    "torchvision==0.24.0",
    "torch_xla[tpu]==2.9.0; sys_platform == 'linux'",
    "tfrecord",
]

[tool.pytest.ini_options]
pythonpath = ["."]
filterwarnings = ["ignore:Failed to initialize NumPy:UserWarning"]

[tool.basedpyright]
typeCheckingMode = "standard"

[tool.ruff]
line-length = 120

[tool.uv.sources]
canvit-pytorch = { git = "https://github.com/m2b3/CanViT-PyTorch.git" }
dinov3 = { git = "https://github.com/yberreby/dinov3.git" }
# NOTE: No torch/torchvision index override here. The TPU finetuning path runs
# on TPU VMs where CUDA wheels are dead weight and were implicated in a 2×
# throughput regression. Nibi/crockett CUDA workflows that need a specific
# cu12x wheel should set `UV_INDEX_URL=https://download.pytorch.org/whl/cuXXX`
# at install time, not pin it in pyproject.
